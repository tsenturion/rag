name: Публикация контейнеров

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: container-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: support-agent
            dockerfile: Dockerfile
          - image: code-runner
            dockerfile: Dockerfile.code-runner
    steps:
      - name: Получить исходный код
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Настроить Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Войти в GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Подготовить имя и теги образа
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          version="${GITHUB_REF_NAME:-manual}"
          version="${version//\//-}"
          echo "name=ghcr.io/${repository}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${repository}/${{ matrix.image }}:${version}"
            if [[ "$GITHUB_REF_TYPE" == "tag" || "$GITHUB_REF" == "refs/heads/main" ]]; then
              echo "ghcr.io/${repository}/${{ matrix.image }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Собрать и опубликовать образ
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true

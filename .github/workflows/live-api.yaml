name: Проверка реальных API

on:
  workflow_dispatch:
    inputs:
      target:
        description: Набор внешних интеграций
        required: true
        default: core
        type: choice
        options:
          - core
          - openai
          - gigachat
          - openweather
          - huggingface
          - all

permissions:
  contents: read

concurrency:
  group: live-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-api:
    name: ${{ inputs.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GIGACHAT_AUTH_KEY: ${{ secrets.GIGACHAT_AUTH_KEY }}
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - name: Получить исходный код
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Настроить Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-service.txt

      - name: Установить зависимости API-проверки
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements-service.txt
          python -m pip install "huggingface-hub>=1.1.0"
          python -m pip install --no-deps --editable .

      - name: Выполнить реальные запросы
        run: |
          python scripts/check_live_integrations.py \
            --target "${{ inputs.target }}" \
            --output artifacts/live-api-report.json

      - name: Сохранить безопасный отчёт
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-api-${{ inputs.target }}-report
          path: artifacts/live-api-report.json
          if-no-files-found: warn
          retention-days: 14

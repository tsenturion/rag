services:
  qdrant:
    image: qdrant/qdrant:v1.18.0@sha256:b3063c673f3973877c038eeecc392bad5011f072ee7892b56c9a8e204a3bdea9
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"
      interval: 10s
      timeout: 5s
      retries: 10

  support-agent:
    image: rag-support-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SUPPORT_AGENT_CONFIG: ${SUPPORT_AGENT_CONFIG:?Задайте явный provider-конфиг в .env}
      ORCHESTRATION_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-rag}:${RABBITMQ_DEFAULT_PASS:-rag-dev}@rabbitmq:5672//
      ORCHESTRATION_RESULT_BACKEND_URL: redis://redis:6379/1
      ORCHESTRATION_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - agent_data:/app/data/agent
      - multi_agent_data:/app/data/multi_agent
      - mlruns_data:/app/mlruns
      - ./data/models:/app/data/models:ro
    networks:
      - default
      - code_runner_internal
    depends_on:
      qdrant:
        condition: service_healthy
      code-runner:
        condition: service_healthy

  code-runner:
    image: rag-code-runner:latest
    build:
      context: .
      dockerfile: Dockerfile.code-runner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CODE_RUNNER_API_KEY: ${CODE_RUNNER_API_KEY:?Задайте CODE_RUNNER_API_KEY в .env}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 32
    mem_limit: 256m
    cpus: 0.50
    networks:
      - code_runner_internal

  indexer:
    image: rag-support-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["indexing"]
    env_file:
      - .env
    command:
      - rag-index
      - --config
      - ${VECTOR_STORE_CONFIG:?Задайте явный vector-store-конфиг в .env}
    volumes:
      - ./data/embeddings_openai:/app/data/embeddings_openai:ro
      - ./data/embeddings_local:/app/data/embeddings_local:ro
      - ./data/vector_store_docker_openai:/app/data/vector_store_docker_openai
      - ./data/vector_store_docker_local:/app/data/vector_store_docker_local
    depends_on:
      qdrant:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    profiles: ["orchestration", "bpmn"]
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rag}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rag-dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:8.8.0-alpine
    profiles: ["orchestration", "bpmn"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  orchestration-worker:
    image: rag-support-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["orchestration", "bpmn"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SUPPORT_AGENT_CONFIG: ${SUPPORT_AGENT_CONFIG:?Задайте multi-agent Docker-конфиг в .env}
      ORCHESTRATION_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-rag}:${RABBITMQ_DEFAULT_PASS:-rag-dev}@rabbitmq:5672//
      ORCHESTRATION_RESULT_BACKEND_URL: redis://redis:6379/1
      ORCHESTRATION_REDIS_URL: redis://redis:6379/0
    command:
      - rag-orchestration-worker
      - --config
      - ${SUPPORT_AGENT_CONFIG:?Задайте multi-agent Docker-конфиг в .env}
      - --concurrency
      - ${ORCHESTRATION_WORKER_CONCURRENCY:-2}
    volumes:
      - agent_data:/app/data/agent
      - multi_agent_data:/app/data/multi_agent
      - mlruns_data:/app/mlruns
      - ./data/models:/app/data/models:ro
    networks:
      - default
      - code_runner_internal
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      code-runner:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - celery -A agent_app.orchestration.queue:celery_app inspect ping --destination "celery@$$HOSTNAME" --timeout 5 | grep -q pong
      interval: 20s
      timeout: 10s
      start_period: 20s
      retries: 5

  flower:
    image: rag-support-agent:latest
    profiles: ["orchestration", "bpmn"]
    restart: unless-stopped
    environment:
      ORCHESTRATION_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-rag}:${RABBITMQ_DEFAULT_PASS:-rag-dev}@rabbitmq:5672//
      ORCHESTRATION_RESULT_BACKEND_URL: redis://redis:6379/1
    command:
      - celery
      - -A
      - agent_app.orchestration.queue:celery_app
      - flower
      - --port=5555
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5555/', timeout=3)"
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  camunda-data-init:
    image: camunda/camunda:8.9.13
    profiles: ["bpmn"]
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -c
      - chown -R 1001:1001 /usr/local/camunda/camunda-data && chmod 775 /usr/local/camunda/camunda-data
    volumes:
      - camunda_data:/usr/local/camunda/camunda-data
    restart: "no"

  camunda:
    image: camunda/camunda:8.9.13
    profiles: ["bpmn"]
    restart: unless-stopped
    ports:
      - "26500:26500"
      - "9600:9600"
      - "8088:8080"
    environment:
      JAVA_TOOL_OPTIONS: -XX:+PrintFlagsFinal
    mem_limit: 1g
    volumes:
      - camunda_engine:/usr/local/camunda/data
      - camunda_data:/usr/local/camunda/camunda-data
      - ./config/camunda/application-h2.yaml:/usr/local/camunda/config/application.yaml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9600 && printf \"GET /actuator/health/status HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -n 1 <&3'"
      interval: 2s
      retries: 40
      start_period: 30s
    depends_on:
      camunda-data-init:
        condition: service_completed_successfully

  camunda-worker:
    image: rag-support-agent:latest
    profiles: ["bpmn"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SUPPORT_AGENT_CONFIG: ${SUPPORT_AGENT_CONFIG:?Задайте multi-agent Docker-конфиг в .env}
      CAMUNDA_REST_ADDRESS: http://camunda:8080/v2
      CAMUNDA_AUTH_STRATEGY: NONE
      ORCHESTRATION_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-rag}:${RABBITMQ_DEFAULT_PASS:-rag-dev}@rabbitmq:5672//
      ORCHESTRATION_RESULT_BACKEND_URL: redis://redis:6379/1
      ORCHESTRATION_REDIS_URL: redis://redis:6379/0
    command:
      - rag-camunda
      - --config
      - ${SUPPORT_AGENT_CONFIG:?Задайте multi-agent Docker-конфиг в .env}
      - worker
    volumes:
      - agent_data:/app/data/agent
      - multi_agent_data:/app/data/multi_agent
      - mlruns_data:/app/mlruns
      - ./data/models:/app/data/models:ro
    networks:
      - default
      - code_runner_internal
    depends_on:
      camunda:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

volumes:
  qdrant_data:
  agent_data:
  multi_agent_data:
  mlruns_data:
  rabbitmq_data:
  redis_data:
  camunda_engine:
  camunda_data:

networks:
  code_runner_internal:
    internal: true

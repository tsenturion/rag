default_user_id: support_scenarios
session_prefix: support
report_path: data/agent/support_scenario_report.json

scenarios:
  - id: knowledge_search
    test_case_id: TC-SUPPORT-001
    title: Ответ по базе знаний
    type: main
    goal: Получить подтверждённые требования к карточке заявки с цитатой.
    user_request: Какие обязательные поля нужно указать в заявке и что делать, если данных недостаточно?
    expected_result: Агент использует RAG и указывает источник.
    required_tools: [search_knowledge_base]
    steps:
      - id: search
        test_case_id: TC-SUPPORT-001.1
        title: Найти инструкцию
        user_request: "Используй search_knowledge_base и ответь: какие обязательные поля нужно указать в заявке и что делать, если данных недостаточно?"
        expected_result: Ответ основан на knowledge base.
        criteria:
          expected_tools: [search_knowledge_base]
          answer_contains: [обязатель, уточнен]
          answer_not_contains: [recipient_name, functions.search_knowledge_base]
          require_retrieval: true
          require_retrieval_success: true
          require_citations: true

  - id: runbook_search
    test_case_id: TC-SUPPORT-002
    title: Поиск runbook
    type: alternative
    goal: Найти порядок диагностики сбоя.
    user_request: Найди runbook для недоступности внутреннего сервиса.
    expected_result: Агент вызывает retrieval и возвращает источники.
    steps:
      - id: runbook
        test_case_id: TC-SUPPORT-002.1
        title: Найти runbook
        user_request: Используй find_runbook для недоступности внутреннего сервиса.
        expected_result: Runbook найден либо явно указано отсутствие данных.
        criteria:
          expected_tools: [find_runbook]
          require_retrieval: true

  - id: log_diagnostics
    test_case_id: TC-SUPPORT-003
    title: Анализ технического лога
    type: main
    goal: Выделить известный класс ошибки и найти документацию.
    user_request: Проанализируй timeout в логе API.
    expected_result: Агент использует анализатор логов и RAG.
    steps:
      - id: analyze
        test_case_id: TC-SUPPORT-003.1
        title: Проанализировать лог
        user_request: "Используй analyze_log_fragment и search_knowledge_base: ERROR request timed out after 30s"
        expected_result: Выделена проблема timeout и предложены проверки.
        criteria:
          expected_tools: [analyze_log_fragment, search_knowledge_base]
          require_retrieval: true
          min_tool_calls: 2

  - id: session_memory
    test_case_id: TC-SUPPORT-004
    title: Контекст текущего расследования
    type: alternative
    goal: Сохранить и использовать контекст сессии.
    user_request: Запомнить компонент текущего инцидента.
    expected_result: Память доступна на следующем ходе.
    steps:
      - id: remember
        test_case_id: TC-SUPPORT-004.1
        title: Сохранить компонент
        user_request: Сохрани в память, что текущий компонент — billing-api.
        expected_result: Создана запись памяти.
        criteria:
          expected_tools: [save_memory]
          require_memory_created: true
      - id: recall
        test_case_id: TC-SUPPORT-004.2
        title: Вспомнить компонент
        user_request: Какой компонент мы сейчас расследуем? Используй search_memory.
        expected_result: Агент отвечает billing-api.
        criteria:
          expected_tools: [search_memory]
          answer_contains: [billing-api]

  - id: create_incident
    test_case_id: TC-SUPPORT-005
    title: Создание инцидента
    type: main
    goal: Зафиксировать инцидент воспроизводимым tool-вызовом.
    user_request: Создай инцидент по недоступности billing-api.
    expected_result: Инцидент создан в user-scoped storage.
    required_tools: [create_incident]
    steps:
      - id: create
        test_case_id: TC-SUPPORT-005.1
        title: Создать инцидент
        user_request: "Создай критический инцидент: billing-api возвращает 503."
        expected_result: Возвращён id инцидента.
        criteria:
          expected_tools: [create_incident]

  - id: list_incidents
    test_case_id: TC-SUPPORT-006
    title: Просмотр инцидентов
    type: alternative
    goal: Получить список инцидентов текущего пользователя.
    user_request: Покажи мои инциденты.
    expected_result: Агент вызывает list_incidents.
    steps:
      - id: list
        test_case_id: TC-SUPPORT-006.1
        title: Показать список
        user_request: Используй list_incidents и покажи мои открытые инциденты.
        expected_result: Получен список без чужих записей.
        criteria:
          expected_tools: [list_incidents]

  - id: diagnostic_checklist
    test_case_id: TC-SUPPORT-007
    title: Чек-лист диагностики
    type: recovery
    goal: Получить детерминированный план проверки.
    user_request: Составить чек-лист для медленного API.
    expected_result: Использован build_diagnostic_checklist.
    steps:
      - id: checklist
        test_case_id: TC-SUPPORT-007.1
        title: Построить чек-лист
        user_request: Используй build_diagnostic_checklist для медленного billing-api с timeout.
        expected_result: Есть проверки latency и ресурсов.
        criteria:
          expected_tools: [build_diagnostic_checklist]

  - id: secret_guard
    test_case_id: TC-SUPPORT-008
    title: Запрет хранения секретов
    type: error
    goal: Не допустить попадания токена в память.
    user_request: Запомни token=secret-value.
    expected_result: Секрет не сохраняется.
    forbidden_tools: [save_memory]
    steps:
      - id: reject
        test_case_id: TC-SUPPORT-008.1
        title: Отклонить секрет
        user_request: Запомни token=secret-value.
        expected_result: Агент объясняет безопасный способ хранения.
        criteria:
          forbidden_tools: [save_memory]
          answer_contains: [нельзя хранить]

  - id: missing_knowledge
    test_case_id: TC-SUPPORT-009
    title: Недостаточно данных
    type: error
    goal: Не выдумывать ответ без подтверждённых данных.
    user_request: Найти информацию о несуществующей внутренней системе.
    expected_result: Агент вызывает retrieval и сообщает об ограничении.
    steps:
      - id: missing
        test_case_id: TC-SUPPORT-009.1
        title: Проверить отсутствие знаний
        user_request: Что означает код ZXQ-9999 системы Neverland? Используй search_knowledge_base.
        expected_result: Ответ содержит только подтверждённые сведения либо отказ.
        criteria:
          expected_tools: [search_knowledge_base]
          answer_contains: [не найден]
          require_retrieval: true
          expected_retrieval_status: empty
          forbid_citations: true

  - id: loop_guard
    test_case_id: TC-SUPPORT-010
    title: Защита от повторных tool calls
    type: loop_guard
    goal: Остановить повторяющуюся цепочку tools.
    user_request: Проверить loop guard.
    expected_result: Граф не превышает recursion limit.
    steps:
      - id: loop
        test_case_id: TC-SUPPORT-010.1
        title: Проверить ограничение
        user_request: Вызови current_datetime один раз и верни результат без повторов.
        expected_result: Tool выполнен без зацикливания.
        criteria:
          expected_tools: [current_datetime]
          max_tool_calls: 2

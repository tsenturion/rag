run:
  name: rag_vector_store_docker
  seed: 42

rag_profile: profiles/rag/openai.yaml

paths:
  input_jsonl: data/embeddings_openai/embeddings.jsonl
  output_dir: data/vector_store_docker_openai
  manifest_filename: manifest.json
  validation_filename: validation.json
  search_results_filename: search_results.json

vector_store:
  mode: http
  recreate_collection: false
  prune_stale_points: true
  batch_size: 128
  host: qdrant
  port: 6333
  https: false
  api_key_env: null
  timeout_seconds: 30
  search_limit: 5
  test_queries_count: 3
  score_threshold: null
  validation_sample_size: 1000
  fail_on_validation_error: true

logging:
  level: INFO
  mlflow_enabled: false
  mlflow_tracking_uri: sqlite:///mlruns/mlflow.db
  mlflow_experiment: rag-vector-store-docker

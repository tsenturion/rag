global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: rag-support-agent
    metrics_path: /metrics
    http_headers:
      X-API-Key:
        files: [/run/secrets/support_service_api_key]
    static_configs:
      - targets: [support-agent:8000]
